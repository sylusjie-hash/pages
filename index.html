<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>错题训练</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="top-bar">
        <button class="icon-button back-button is-hidden" id="backButton" type="button" aria-label="返回"></button>
        <h1 id="pageTitle">错题训练</h1>
        <button class="text-button" id="exportButton" type="button">导出</button>
      </header>

      <section id="entryGateView" class="view" aria-label="上一级页面"></section>
      <section id="homeView" class="view is-active" aria-label="首页"></section>
      <section id="moduleReportView" class="view" aria-label="模块报告"></section>
      <section id="focusView" class="view" aria-label="重点复练"></section>
      <section id="settingsView" class="view" aria-label="训练设置"></section>
      <section id="practiceView" class="view" aria-label="错题练习"></section>
      <section id="answerSheetView" class="view" aria-label="答题卡"></section>
      <section id="analysisView" class="view" aria-label="逐题解析"></section>
      <section id="resultView" class="view" aria-label="练习报告"></section>
      <section id="exportView" class="view" aria-label="导出 PDF"></section>
    </main>
    <div id="timeRangeModalRoot"></div>

    <script src="./seed-data.js"></script>
    <script src="./app.js"></script>
    <script src="./home-overrides.js"></script>
  </body>
</html>
