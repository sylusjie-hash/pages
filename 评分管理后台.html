<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>试卷评分管理后台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./评分工具样式.css" />
  </head>
  <body>
    <main id="paper-review-admin" class="review-shell">
      <section class="content-grid">
        <section class="panel-card">
          <div class="panel-head">
            <div>
              <h2 class="panel-title">筛选条件</h2>
              <p class="panel-desc">列表先展示决策信息，再保留基础字段，方便快速判断哪张卷好、哪张卷需要处理。</p>
            </div>
            <div class="toolbar">
              <a class="btn secondary" href="./评分录入页.html">打开评分页</a>
              <button class="btn secondary" type="button" data-action="refresh-list">刷新列表</button>
              <button class="btn primary" type="button" data-action="export-list">导出 CSV</button>
            </div>
          </div>

          <form id="filter-form" class="form-grid">
            <div class="field">
              <label for="filter-batch">批次</label>
              <select id="filter-batch" name="batch">
                <option value="">全部批次</option>
                <option value="第一批">第一批</option>
                <option value="第二批">第二批</option>
                <option value="第三批">第三批</option>
              </select>
            </div>
            <div class="field">
              <label for="filter-status">审核结论</label>
              <select id="filter-status" name="status">
                <option value="">全部结论</option>
                <option value="合格">合格</option>
                <option value="待修改">待修改</option>
                <option value="不合格">不合格</option>
              </select>
            </div>
            <div class="field full">
              <label for="filter-keyword">关键词</label>
              <input id="filter-keyword" name="keyword" placeholder="搜索试卷名称、编号、审核人或学科模块" />
            </div>
            <div class="toolbar">
              <button class="btn primary" type="submit">应用筛选</button>
              <button class="btn secondary" type="button" data-action="reset-filters">重置筛选</button>
            </div>
          </form>

          <div class="quick-filter-row" style="margin-top: 16px;">
            <button class="quick-filter-btn active" type="button" data-quick-filter="all">全部</button>
            <button class="quick-filter-btn" type="button" data-quick-filter="合格">合格</button>
            <button class="quick-filter-btn" type="button" data-quick-filter="待修改">待修改</button>
            <button class="quick-filter-btn" type="button" data-quick-filter="不合格">不合格</button>
            <button class="quick-filter-btn" type="button" data-quick-filter="issues">有问题维度</button>
            <button class="quick-filter-btn" type="button" data-quick-filter="veto">有一票否决</button>
          </div>

          <div id="admin-status" class="status-banner info">
            后台页面已就绪，首次加载时会自动拉取评分数据。
          </div>
        </section>

        <section class="metrics-grid">
          <article class="metric-card">
            <span>记录总数</span>
            <strong data-metric="total">0</strong>
          </article>
          <article class="metric-card">
            <span>平均总分</span>
            <strong data-metric="avg">0</strong>
          </article>
          <article class="metric-card">
            <span>合格率</span>
            <strong data-metric="pass">0%</strong>
          </article>
          <article class="metric-card">
            <span>一票否决</span>
            <strong data-metric="veto">0</strong>
          </article>
        </section>

        <section class="panel-card">
          <div class="panel-head">
            <div>
              <h2 class="panel-title">评分记录卡片列表</h2>
              <p class="panel-desc">每张卡片直接展示审核结论、六维评分、问题维度和展开说明，不再拆成左右两栏。</p>
            </div>
          </div>
          <div id="review-card-list" class="card-list">
            <div class="card-empty">正在等待数据加载……</div>
          </div>
        </section>
      </section>
    </main>

    <script src="./评分工具接口配置.js"></script>
    <script src="./评分工具脚本.js"></script>
  </body>
</html>
